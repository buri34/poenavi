name: CI

on:
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Validate localization and Python scoping
        env:
          PYTHONUTF8: "1"
        run: python scripts/validate_locales.py

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUTF8: "1"
        run: python -m pytest -q
